name: Deploy Jekyll site to Pages
on:
  workflow_call:
    inputs:
      environment:
        description: Jekyll environment
        required: false
        type: string
        default: production
      environment_url:
        description: Environment URL
        required: false
        type: string
      deploy_enabled:
        description: Deploy to Pages
        required: false
        type: boolean
        default: true
      custom_commands:
        description: Custom build commands
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run custom build commands
        if: ${{ inputs.custom_commands }}
        run: ${{ inputs.custom_commands }}

      - name: Set up Pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: ${{ inputs.environment }}
          JEKYLL_GITHUB_TOKEN: ${{ github.token }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    if: ${{ inputs.deploy_enabled }}
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.get_url.outputs.url }}
    steps:
      - id: deploy
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5

      - id: get_url
        name: Get page URL
        run: |
          url=$(sed 's/^http:/https:/' <<< "${{ inputs.environment_url || steps.deploy.outputs.page_url }}")
          echo "url=$url" >> $GITHUB_OUTPUT
